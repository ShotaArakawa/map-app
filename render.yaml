services:
  - type: web
    name: map-app
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/map-app.jar
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
